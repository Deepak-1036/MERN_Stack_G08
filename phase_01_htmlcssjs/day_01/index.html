<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 1px solid black;
            width: 90%;
            margin: auto;
            height: 500px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #container >
        div{
            border: 1px solid red;
            height: 150px;
            width: 30%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: lightblue;
            border-radius: 5%;
            box-shadow: rgba(88, 88, 96, 0.25);
        }
    </style>
</head>
<body>
    <div id="container">
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am div1</div>
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am div2</div>
    <div style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">I am div3</div>
    </div>
</body>
</html>
